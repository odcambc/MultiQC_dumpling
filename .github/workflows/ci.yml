name: CI

# Runs the test suite on every push to main and on every pull request, so
# breakage is caught before a release tag is ever cut.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel an in-flight run when new commits are pushed to the same ref.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Run tests
        run: python -m pytest tests/
